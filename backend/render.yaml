services:
  - type: web
    name: livenews-ai-backend
    runtime: python
    buildCommand: |
      pip install -r requirements.txt &&
      cd .. &&
      npm install &&
      npm run build &&
      rm -rf backend/static &&
      cp -r dist backend/static
    startCommand: python main.py
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
